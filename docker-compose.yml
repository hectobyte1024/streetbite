services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: streetbite2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/streetbite2
      PORT: 3000
    depends_on:
      - postgres
    ports:
      - "3000:3000"

volumes:
  postgres_data:
